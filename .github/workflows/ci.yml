name: CI

on:
  push:
    branches:
      - "**"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run type-check
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tpro_ci
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      AUTH_ENCRYPTION_KEY: ci-only-independent-auth-encryption-key-with-at-least-32-characters
      SUPABASE_URL: https://example.invalid
      SUPABASE_ANON_KEY: ci-only-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-only-service-role-key
      GOOGLE_CLIENT_ID: ci-client.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-only-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:3000/auth/google/callback
      AUTH_COOKIE_SECURE: "false"
      OWNER_ADMIN_EMAIL: owner@example.com
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tpro_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tpro_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: ruff format --check app tests
      - run: pytest -q
      - run: pip-audit -r requirements.txt
      - name: Verify migrations and database security
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: tpro_ci
        run: |
          psql -v ON_ERROR_STOP=1 -f tests/sql/supabase_bootstrap.sql
          for migration in supabase/migrations/*.sql; do
            if [ "$(basename "$migration")" = "028_fee_refund_ledger.sql" ]; then
              psql -v ON_ERROR_STOP=1 -f tests/sql/pre_refund_upgrade_fixture.sql
            fi
            psql -v ON_ERROR_STOP=1 -f "$migration"
          done
          psql -v ON_ERROR_STOP=1 -f tests/sql/verify_security.sql
      - name: Verify fee transactions against PostgreSQL
        env:
          RUN_DB_INTEGRATION: "1"
        run: pytest -q -m db_integration
