limit_req_zone $binary_remote_addr zone=tpro_auth_ip:10m rate=30r/m;

# Never log query strings: invitation tokens, OAuth codes/state and other
# one-time credentials can appear there. Avoid $request, $request_uri and
# $http_referer in every production access-log format for this application.
log_format tpro_redacted '$remote_addr - [$time_local] '
                         '"$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent "$http_user_agent"';

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    client_max_body_size 2m;
    access_log /var/log/nginx/access.log tpro_redacted;

    # OAuth authorization codes and state values are one-time credentials.
    # Route the callback normally but never write its query string to access logs.
    location = /auth/google/callback {
        access_log off;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    # Invitation links carry a single-use token in the query string.
    location = /register {
        access_log off;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    # Keep an IP-level shock absorber only on credential/OTP/MFA mutations.
    # Backend per-email/user rate limits remain authoritative; authenticated
    # reads such as /me, avatars, users and invitations must not share this NAT
    # budget or dashboard loads would be throttled.
    location ~ ^/api/proxy/auth/(?:login(?:/totp/verify|/recovery/verify)?|register(?:/resend|/verify)?|password/reset/(?:start|verify-otp|complete)|onboarding/totp/(?:enroll|verify)|onboarding/recovery/confirm)$ {
        limit_req zone=tpro_auth_ip burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    location /api/proxy/auth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# Terminate TLS with Certbot or the production load balancer. Enable HSTS only
# on the HTTPS virtual host after every subdomain is confirmed HTTPS-capable.
